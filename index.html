<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nick & Cindy — December 2, 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Cinzel:wght@400;600&family=Petit+Formal+Script&family=Jost:wght@300&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lenis@1.0.5/bundled/lenis.min.js"></script>

<style>
:root{
  --bg:#1a2e22;
  --card:#263d2e;
  --gold:#c9a84c;
  --cream:#faf7f2;
  --text:#dfe9e2;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Cormorant Garamond',serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-family:'Petit Formal Script';
  font-size:clamp(60px,10vw,110px);
  color:var(--cream);
}

.hero span{
  font-size:50px;
  color:var(--gold);
}

.hero p{
  letter-spacing:5px;
  font-family:'Cinzel';
  margin-top:20px;
}

/* SECTION */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

.section h2{
  font-size:40px;
  margin-bottom:20px;
}

.section p{
  font-size:20px;
  line-height:1.8;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:60px;
}

.gallery-item{
  position:relative;
  overflow:hidden;
  height:350px;
  border-radius:16px;
  transform:translateY(50px);
  opacity:0;
  transition:1s ease;
}

.gallery-item.visible{
  transform:translateY(0);
  opacity:1;
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 1.2s ease;
}

.gallery-item:hover img{
  transform:scale(1.15);
}

.gallery-caption{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
  font-size:20px;
}

/* RSVP */
.rsvp{
  background:var(--card);
  padding:60px;
  border-radius:12px;
  max-width:500px;
  margin:auto;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  background:#1f3327;
  border:1px solid #3c5c49;
  color:white;
}

button{
  width:100%;
  padding:16px;
  background:var(--gold);
  border:none;
  cursor:pointer;
}

/* reveal */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.reveal.visible{
  opacity:1;
  transform:none;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Nick <span>&</span> Cindy</h1>
  <p>DECEMBER 2 · 2026</p>
</section>

<!-- MESSAGE -->
<section class="section reveal">
  <h2>Our Story</h2>
  <p>
    With hearts full of love, we invite you to celebrate with us.
    This day marks the beginning of our forever.
  </p>
</section>

<!-- PRENUP GALLERY -->
<section class="section">
  <h2 class="reveal">Pre-Wedding Moments</h2>

  <div class="gallery">
    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
      <div class="gallery-caption">A quiet afternoon</div>
    </div>

    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
      <div class="gallery-caption">Where it began</div>
    </div>

    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
      <div class="gallery-caption">Adventures</div>
    </div>

    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
      <div class="gallery-caption">Forever starts here</div>
    </div>
  </div>
</section>

<!-- RSVP -->
<section class="section">
  <div class="rsvp reveal">
    <h2>RSVP</h2>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button onclick="submitRSVP()">Send</button>
  </div>
</section>

<script>
/* SMOOTH SCROLL */
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* REVEAL */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
    }
  });
},{threshold:0.2});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
document.querySelectorAll('.gallery-item').forEach(el=>observer.observe(el));

/* PARALLAX */
window.addEventListener('scroll',()=>{
  document.querySelectorAll('.gallery-item img').forEach(img=>{
    const speed=0.05;
    img.style.transform=`translateY(${window.scrollY*speed}px) scale(1.1)`;
  });
});

/* RSVP */
function submitRSVP(){
  alert("RSVP Sent!");
}
</script>

</body>
</html>
